services:
  homepage:
    image: ghcr.io/benphelps/homepage:latest
    container_name: homepage
    # uncomment if you do not want to run as root
    user: 1000:1000 #run as standard user
    # uncomment if you are not using a reverse proxy and remove the traefik labels below
    #ports:
    #  - 3000:3000
    restart: unless-stopped
    volumes:
      - /home/${USER}/docker/homepage/config:/app/config # Make sure your local config directory exists
     # - /var/run/docker.sock:/var/run/docker.sock # (optional) For docker integrations, i would disable this as it is a security risk, but if you want to use the docker integration, you will need to enable this.
    networks:
      proxy:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.entrypoints=http"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.middlewares=default-whitelist@file"
      - "traefik.http.middlewares.${TRAEFIK_ROUTER_NAME}-https-redirect.redirectscheme.scheme=https"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}.middlewares=${TRAEFIK_ROUTER_NAME}-https-redirect"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-secure.entrypoints=https"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-secure.rule=Host(`${DOMAIN_NAME}`)"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-secure.tls=true"
      - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-secure.service=${TRAEFIK_ROUTER_NAME}"
      - "traefik.http.services.${TRAEFIK_ROUTER_NAME}.loadbalancer.server.port=3000"
     # - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-secure.middlewares=default-whitelist@file" # uncomment if you want to use a Traefik whitelist to restrict access
     # - "traefik.http.routers.${TRAEFIK_ROUTER_NAME}-secure.middlewares=authelia@docker" # uncomment if you want to use authelia
     # - "traefik.docker.network=proxy"
    env_file:
      - .env
networks:
  proxy:
    external: true